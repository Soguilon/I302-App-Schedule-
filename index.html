<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ClassLine — Schedule Dashboard</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --bg: #0D0D0D;
  --bg-2: #161616;
  --bg-3: #1D1B22;
  --card: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --purple: #8B5CF6;
  --purple-2: #A78BFA;
  --violet: #6D28D9;
  --text: #F5F3F7;
  --text-dim: #A6A1AE;
  --text-faint: #6B6672;
  --green: #34D399;
  --yellow: #FBBF24;
  --red: #F87171;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --shadow-soft: 0 8px 30px rgba(0,0,0,0.35);
  --ease: cubic-bezier(.22,.61,.36,1);
}

[data-theme="light"]{
  --bg: #F5F6FA;
  --bg-2: #FFFFFF;
  --bg-3: #EEF0F6;
  --card: rgba(255,255,255,0.75);
  --card-border: rgba(15,23,42,0.08);
  --purple: #1E3A8A;
  --purple-2: #2563EB;
  --violet: #1E40AF;
  --text: #10141F;
  --text-dim: #565D6D;
  --text-faint: #8A90A0;
  --green: #059669;
  --yellow: #B45309;
  --red: #DC2626;
  --shadow-soft: 0 8px 24px rgba(30,58,138,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html{scroll-behavior:smooth;}

body{
  background:
    radial-gradient(circle at 15% 0%, rgba(139,92,246,0.10), transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(109,40,217,0.08), transparent 40%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  transition:background .35s var(--ease), color .35s var(--ease);
  -webkit-font-smoothing:antialiased;
}

[data-theme="light"] body{
  background:
    radial-gradient(circle at 15% 0%, rgba(37,99,235,0.06), transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(30,58,138,0.05), transparent 40%),
    var(--bg);
}

.wrap{max-width:1100px;margin:0 auto;padding:20px 20px 60px;}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 4px 22px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg, var(--purple), var(--violet));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(139,92,246,0.35);
  flex-shrink:0;
}
.brand-mark i{color:#fff;font-size:16px;}
.brand-text{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-0.02em;}
.brand-text span{color:var(--purple-2);}

.theme-toggle{
  display:flex;align-items:center;gap:8px;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:100px;
  padding:6px;
  cursor:pointer;
  min-height:44px;
  backdrop-filter:blur(12px);
}
.theme-toggle .icon-slot{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text-faint);
  transition:color .2s var(--ease), background .2s var(--ease);
}
.theme-toggle .icon-slot.active{
  background:linear-gradient(135deg, var(--purple), var(--violet));
  color:#fff;
}

/* ============================================================
   HERO / CLOCK PANEL — signature element
   ============================================================ */
.hero{
  position:relative;
  border-radius:24px;
  padding:28px 26px;
  background:linear-gradient(155deg, rgba(139,92,246,0.14), rgba(255,255,255,0.02) 60%), var(--card);
  border:1px solid var(--card-border);
  overflow:hidden;
  backdrop-filter:blur(18px);
  box-shadow:var(--shadow-soft);
  margin-bottom:22px;
}
.hero::before{
  content:"";
  position:absolute; inset:-40% -10% auto auto;
  width:280px;height:280px;
  background:radial-gradient(circle, rgba(139,92,246,0.28), transparent 70%);
  pointer-events:none;
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;}
.hero-date .day{
  font-family:var(--font-display);font-weight:700;
  font-size:clamp(26px,5vw,34px);
  letter-spacing:-0.02em;line-height:1.1;
}
.hero-date .full-date{
  color:var(--text-dim); font-size:14px; margin-top:4px;
  display:flex; align-items:center; gap:7px;
}
.hero-clock{
  text-align:right;
  font-family:var(--font-mono);
  font-weight:600;
  font-size:clamp(28px,6vw,40px);
  letter-spacing:0.01em;
  color:var(--purple-2);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.hero-clock .meridiem{font-size:0.4em;color:var(--text-dim);margin-left:4px;}
.hero-clock .sub{
  font-family:var(--font-body);font-weight:500;
  font-size:12px;color:var(--text-faint);margin-top:6px;
}

.hero-status{
  margin-top:20px; padding-top:18px;
  border-top:1px solid var(--card-border);
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.hero-status .pulse-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 4px rgba(52,211,153,0.18);
  flex-shrink:0;
}
.hero-status.idle .pulse-dot{background:var(--text-faint);box-shadow:0 0 0 4px rgba(107,102,114,0.12);}
.hero-status-text{font-size:14px;color:var(--text-dim);}
.hero-status-text strong{color:var(--text);font-weight:600;}

/* ============================================================
   NAV TABS
   ============================================================ */
.tabs{
  display:flex;gap:8px;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:100px;
  padding:6px;
  margin-bottom:22px;
  backdrop-filter:blur(12px);
}
.tab-btn{
  flex:1;
  min-height:44px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;background:transparent;cursor:pointer;
  border-radius:100px;
  color:var(--text-dim);
  font-family:var(--font-body);font-weight:600;font-size:14px;
  transition:background .25s var(--ease), color .25s var(--ease);
}
.tab-btn i{font-size:13px;}
.tab-btn.active{
  background:linear-gradient(135deg, var(--purple), var(--violet));
  color:#fff;
  box-shadow:0 4px 14px rgba(139,92,246,0.3);
}

/* ============================================================
   VIEWS
   ============================================================ */
.view{display:none;}
.view.active{display:block;animation:fadeIn .3s var(--ease);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.section-label{
  font-family:var(--font-display);font-weight:600;font-size:13px;
  text-transform:uppercase;letter-spacing:0.09em;
  color:var(--text-faint);
  margin:26px 4px 12px;
  display:flex;align-items:center;gap:8px;
}
.section-label:first-child{margin-top:0;}

/* Empty state */
.empty-state{
  text-align:center;
  padding:56px 20px;
  border-radius:var(--radius-lg);
  background:var(--card);
  border:1px solid var(--card-border);
  backdrop-filter:blur(12px);
}
.empty-state i{font-size:40px;color:var(--purple-2);margin-bottom:14px;display:block;}
.empty-state h3{font-family:var(--font-display);font-size:19px;margin-bottom:6px;}
.empty-state p{color:var(--text-dim);font-size:14px;}

/* ============================================================
   CLASS CARDS
   ============================================================ */
.class-card{
  position:relative;
  border-radius:var(--radius-lg);
  padding:18px 18px 16px;
  background:var(--card);
  border:1px solid var(--card-border);
  backdrop-filter:blur(14px);
  margin-bottom:14px;
  transition:transform .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease);
  will-change:transform;
}
.class-card:hover{
  transform:translateY(-2px);
  border-color:rgba(139,92,246,0.35);
  box-shadow:var(--shadow-soft);
}
.class-card.featured{
  border-color:rgba(139,92,246,0.5);
  background:linear-gradient(155deg, rgba(139,92,246,0.12), rgba(255,255,255,0.02));
}
.class-card.finished{opacity:0.55;}

.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;}
.cc-code{
  font-family:var(--font-mono);font-weight:600;font-size:12px;
  color:var(--purple-2);
  background:rgba(139,92,246,0.12);
  padding:3px 9px;border-radius:7px;
  display:inline-block;margin-bottom:6px;
  letter-spacing:0.02em;
}
.cc-name{font-family:var(--font-display);font-weight:600;font-size:16.5px;line-height:1.3;}

.status-pill{
  display:flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:600;
  padding:5px 10px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.03em;
}
.status-pill i{font-size:7px;}
.status-pill.ongoing{background:rgba(52,211,153,0.14);color:var(--green);}
.status-pill.upcoming{background:rgba(251,191,36,0.14);color:var(--yellow);}
.status-pill.finished{background:rgba(248,113,113,0.1);color:var(--red);}

.cc-meta{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px 14px;
  margin-bottom:12px;
}
.cc-meta-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim);}
.cc-meta-item i{width:14px;color:var(--purple-2);font-size:12px;flex-shrink:0;}
.cc-meta-item b{color:var(--text);font-weight:500;}

.cc-time{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:13px;font-weight:600;
  color:var(--text);
  padding-top:12px;border-top:1px solid var(--card-border);
}
.cc-time i{color:var(--purple-2);font-size:12px;}
.cc-time .arrow{color:var(--text-faint);font-weight:400;}

.cc-countdown{
  margin-top:10px;
  display:flex;align-items:center;gap:7px;
  font-size:12.5px;font-weight:600;
  padding:8px 12px;border-radius:var(--radius-sm);
  background:rgba(139,92,246,0.08);
  color:var(--purple-2);
}
.cc-countdown i{font-size:11px;}
.cc-countdown.ending{background:rgba(52,211,153,0.1);color:var(--green);}

.task-reminder{
  margin-top:10px;
  display:flex;align-items:flex-start;gap:9px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:rgba(251,191,36,0.09);
  border:1px solid rgba(251,191,36,0.18);
}
.task-reminder i{color:var(--yellow);font-size:13px;margin-top:2px;flex-shrink:0;}
.task-reminder-body{font-size:12.5px;color:var(--text-dim);line-height:1.4;}
.task-reminder-body b{color:var(--text);font-weight:600;}
.task-reminder-body .tr-due{color:var(--yellow);font-weight:600;}
.task-reminder-content{margin-top:4px;color:var(--text-dim);}
.task-reminder + .task-reminder{margin-top:8px;}

/* ============================================================
   WEEKLY VIEW
   ============================================================ */
.week-day-block{margin-bottom:22px;}
.week-day-header{
  display:flex;align-items:center;gap:10px;
  margin:0 4px 12px;
}
.week-day-header .dot{width:8px;height:8px;border-radius:50%;background:var(--purple);flex-shrink:0;}
.week-day-header h3{font-family:var(--font-display);font-weight:600;font-size:16px;}
.week-day-header .count{font-size:12px;color:var(--text-faint);margin-left:auto;}
.week-day-header.today .dot{background:var(--green);box-shadow:0 0 0 4px rgba(52,211,153,0.18);}
.week-day-header.today h3{color:var(--purple-2);}

.week-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(270px,1fr));
  gap:12px;
}
.week-card{
  border-radius:var(--radius-md);
  padding:15px 16px;
  background:var(--card);
  border:1px solid var(--card-border);
  backdrop-filter:blur(10px);
  transition:transform .2s var(--ease), border-color .2s var(--ease);
}
.week-card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,0.3);}
.week-card .wc-code{
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  color:var(--purple-2);margin-bottom:5px;letter-spacing:0.02em;
}
.week-card .wc-name{font-family:var(--font-display);font-weight:600;font-size:14.5px;margin-bottom:10px;line-height:1.3;}
.week-card .wc-row{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;}
.week-card .wc-row:last-child{margin-bottom:0;}
.week-card .wc-row i{width:13px;color:var(--purple-2);font-size:11px;flex-shrink:0;}

/* ============================================================
   TASKS VIEW
   ============================================================ */
.task-form{
  border-radius:var(--radius-lg);
  padding:20px;
  background:var(--card);
  border:1px solid var(--card-border);
  backdrop-filter:blur(14px);
  margin-bottom:8px;
}
.task-form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{
  font-size:12px;font-weight:600;color:var(--text-dim);
  display:flex;align-items:center;gap:6px;
}
.field label i{color:var(--purple-2);font-size:11px;width:12px;}
.field input, .field select, .field textarea{
  min-height:44px;
  border-radius:var(--radius-sm);
  border:1px solid var(--card-border);
  background:var(--bg-2);
  color:var(--text);
  padding:10px 12px;
  font-family:var(--font-body);font-size:14px;
  outline:none;
  transition:border-color .2s var(--ease);
}
.field textarea{resize:vertical;line-height:1.5;min-height:60px;}
.field input::placeholder, .field textarea::placeholder{color:var(--text-faint);}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--purple);}
.field select{cursor:pointer;}

.task-form-actions{
  display:flex;gap:10px;justify-content:flex-end;
  margin-top:16px;
}
.btn-primary, .btn-ghost{
  min-height:44px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:100px;
  border:none;cursor:pointer;
  font-family:var(--font-body);font-weight:600;font-size:14px;
  padding:0 20px;
  transition:transform .15s var(--ease), opacity .15s var(--ease);
}
.btn-primary{
  background:linear-gradient(135deg, var(--purple), var(--violet));
  color:#fff;
  box-shadow:0 4px 14px rgba(139,92,246,0.3);
}
.btn-primary:hover{transform:translateY(-1px);}
.btn-ghost{
  background:transparent;
  border:1px solid var(--card-border);
  color:var(--text-dim);
}
.btn-ghost:hover{color:var(--text);}

.task-card{
  border-radius:var(--radius-lg);
  padding:16px 18px;
  background:var(--card);
  border:1px solid var(--card-border);
  backdrop-filter:blur(14px);
  margin-bottom:12px;
  transition:transform .2s var(--ease), border-color .2s var(--ease);
}
.task-card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,0.3);}
.task-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
.task-card .tc-subject{
  font-family:var(--font-mono);font-weight:600;font-size:11.5px;
  color:var(--purple-2);
  background:rgba(139,92,246,0.12);
  padding:3px 9px;border-radius:7px;
  display:inline-block;margin-bottom:6px;
}
.task-card .tc-title{font-family:var(--font-display);font-weight:600;font-size:15.5px;line-height:1.3;}

/* Bullet list rendering for multi-line task content — uses Font Awesome
   glyphs as markers instead of default browser bullets or emoji. */
.task-list{
  list-style:none;margin:6px 0 0;padding:0;
  display:flex;flex-direction:column;gap:6px;
}
.task-list li{
  position:relative;padding-left:19px;
  font-family:var(--font-body);font-weight:500;font-size:13.5px;
  line-height:1.45;color:var(--text);
}
.task-list li::before{
  content:"\f054"; /* fa-chevron-right */
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:absolute;left:1px;top:4px;
  font-size:8px;color:var(--purple-2);
}
.task-reminder-body .task-list{margin-top:8px;}
.task-reminder-body .task-list li{font-size:12.5px;color:var(--text-dim);}
.task-reminder-body .task-list li::before{top:5px;}
.task-card .tc-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--text-dim);margin-bottom:10px;}
.task-card .tc-meta span{display:flex;align-items:center;gap:6px;}
.task-card .tc-meta i{color:var(--purple-2);font-size:11px;}
.task-card .tc-countdown{
  font-size:12.5px;font-weight:600;color:var(--text);
  padding-top:10px;border-top:1px solid var(--card-border);
  display:flex;align-items:center;gap:7px;margin-bottom:12px;
}
.task-card .tc-countdown i{color:var(--purple-2);font-size:11px;}
.task-card .tc-actions{display:flex;gap:8px;}
.tc-icon-btn{
  width:38px;height:38px;min-height:38px;
  border-radius:10px;
  border:1px solid var(--card-border);
  background:var(--bg-2);
  color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;
  transition:color .2s var(--ease), border-color .2s var(--ease);
}
.tc-icon-btn:hover{color:var(--purple-2);border-color:rgba(139,92,246,0.35);}
.tc-icon-btn.danger:hover{color:var(--red);border-color:rgba(248,113,113,0.35);}
.tc-icon-btn.success:hover{color:var(--green);border-color:rgba(52,211,153,0.35);}

.task-pill{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;
  padding:5px 10px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.03em;
}
.task-pill i{font-size:7px;}
.task-pill.upcoming{background:rgba(139,92,246,0.14);color:var(--purple-2);}
.task-pill.due-today{background:rgba(251,191,36,0.14);color:var(--yellow);}
.task-pill.overdue{background:rgba(248,113,113,0.1);color:var(--red);}

.task-card.previous{opacity:0.65;}
.task-card.previous:hover{opacity:1;}
.task-pill.reason-completed{background:rgba(52,211,153,0.14);color:var(--green);}
.task-pill.reason-expired{background:rgba(248,113,113,0.1);color:var(--red);}
.task-pill.reason-deleted{background:rgba(166,161,174,0.14);color:var(--text-faint);}

/* ============================================================
   FOOTER
   ============================================================ */
.footer-note{
  text-align:center;color:var(--text-faint);font-size:12px;
  margin-top:30px;display:flex;align-items:center;justify-content:center;gap:6px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:600px){
  .wrap{padding:14px 14px 44px;}
  .brand-text{font-size:17px;}
  .hero{padding:22px 18px;border-radius:20px;}
  .hero-top{flex-direction:column;}
  .hero-clock{text-align:left;}
  .cc-meta{grid-template-columns:1fr;}
  .tab-btn{font-size:13px;padding:0 6px;}
  .week-grid{grid-template-columns:1fr;}
  .task-form-grid{grid-template-columns:1fr;}
  .task-form-actions{flex-direction:column-reverse;}
  .task-form-actions .btn-primary, .task-form-actions .btn-ghost{width:100%;}
}

@media (min-width:601px) and (max-width:900px){
  .week-grid{grid-template-columns:repeat(2,1fr);}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><i class="fa-solid fa-graduation-cap"></i></div>
      <div class="brand-text">Class<span>Line</span></div>
    </div>
    <div class="theme-toggle" id="themeToggle" role="button" aria-label="Toggle theme">
      <div class="icon-slot" id="moonSlot"><i class="fa-solid fa-moon"></i></div>
      <div class="icon-slot" id="sunSlot"><i class="fa-solid fa-sun"></i></div>
    </div>
  </div>

  <!-- HERO / LIVE CLOCK -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-date">
        <div class="day" id="heroDay">—</div>
        <div class="full-date"><i class="fa-solid fa-calendar-days"></i><span id="heroFullDate">—</span></div>
      </div>
      <div class="hero-clock">
        <span id="heroTime">--:--:--</span><span class="meridiem" id="heroMeridiem">--</span>
        <div class="sub">Local time · auto-synced</div>

    <div class="hero-status" id="heroStatus">
      <div class="pulse-dot"></div>
      <div class="hero-status-text" id="heroStatusText">Checking today's schedule…</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-view="daily"><i class="fa-solid fa-calendar-day"></i> Daily</button>
    <button class="tab-btn" data-view="weekly"><i class="fa-solid fa-calendar-week"></i> Weekly</button>
    <button class="tab-btn" data-view="tasks"><i class="fa-solid fa-clipboard-list"></i> Tasks</button>
  </div>

  <!-- DAILY VIEW -->
  <div class="view active" id="view-daily">
    <div id="dailyContent"></div>
  </div>

  <!-- WEEKLY VIEW -->
  <div class="view" id="view-weekly">
    <div id="weeklyContent"></div>
  </div>

  <!-- TASKS VIEW -->
  <div class="view" id="view-tasks">
    <div class="section-label"><i class="fa-solid fa-plus"></i> Add New Task</div>
    <form class="task-form" id="taskForm">
      <div class="task-form-grid">
        <div class="field">
          <label for="taskSubject"><i class="fa-solid fa-book"></i> Subject</label>
          <select id="taskSubject" required></select>
        </div>
        <div class="field">
          <label for="taskTitle"><i class="fa-solid fa-pencil"></i> Task</label>
          <textarea id="taskTitle" rows="2" placeholder="e.g. Submit lab report&#10;One line per item for a checklist" maxlength="500" required></textarea>
        </div>
        <div class="field">
          <label for="taskDate"><i class="fa-solid fa-calendar-days"></i> Due Date</label>
          <input type="date" id="taskDate" required>
        </div>
        <div class="field">
          <label for="taskTime"><i class="fa-solid fa-clock"></i> Due Time</label>
          <input type="time" id="taskTime" required>
        </div>

        <button type="button" class="btn-ghost" id="cancelEditBtn" style="display:none;"><i class="fa-solid fa-xmark"></i> Cancel</button>
        <button type="submit" class="btn-primary" id="taskSubmitBtn"><i class="fa-solid fa-plus"></i> <span>Add Task</span></button>
      </div>

    <div class="section-label"><i class="fa-solid fa-list-check"></i> Active Tasks</div>
    <div id="activeTasksList"></div>

    <div class="section-label"><i class="fa-solid fa-clock-rotate-left"></i> Previous Tasks</div>
    <div id="previousTasksList"></div>
  </div>

  <div class="footer-note"><i class="fa-regular fa-clock"></i> Updates live, every second</div>
</div>

<script>
(function(){
"use strict";

/* ============================================================
   SCHEDULE DATA
   Times stored as minutes-from-midnight for fast comparison.
   ============================================================ */
function tmin(h, m, pm){ // convert 12h clock to 24h minutes
  let hh = h % 12;
  if(pm) hh += 12;
  return hh*60 + m;
}

const SCHEDULE = [
  // Monday
  {day:"Monday", code:"7ANATECH", name:"Analytics Techniques and Tools", instructor:"Balboa, Mark Angelo", room:"CISCO LAB", start:tmin(2,0,true), end:tmin(4,0,true)},
  {day:"Monday", code:"7ISR", name:"IS Research", instructor:"Ballevar, Vincent", room:"CLAB1", start:tmin(5,0,true), end:tmin(8,0,true)},
  // Tuesday
  {day:"Tuesday", code:"7PROJMAN", name:"IS Project Management", instructor:"Santiago, Jan Catherine S.", room:"CLAB5", start:tmin(2,0,true), end:tmin(5,0,true)},
  {day:"Tuesday", code:"7NET2", name:"Routing and Switching Essentials", instructor:"Yabut, Alex Brynell", room:"CLAB2", start:tmin(5,0,true), end:tmin(7,0,true)},
  // Wednesday
  {day:"Wednesday", code:"BUSCOM", name:"Business Communication", instructor:"San Pedro, Abraham", room:"L309", start:tmin(10,0,false), end:tmin(1,0,true)},
  {day:"Wednesday", code:"7ANATECH", name:"Analytics Techniques and Tools (Laboratory)", instructor:"Balboa, Mark Angelo", room:"CLAB8", start:tmin(2,0,true), end:tmin(5,0,true)},
  // Thursday
  {day:"Thursday", code:"7EBP", name:"Evaluation and Business Process", instructor:"Cuyugan, Romel", room:"L305", start:tmin(10,0,false), end:tmin(1,0,true)},
  {day:"Thursday", code:"7NET2", name:"Routing and Switching Essentials (Laboratory)", instructor:"Yabut, Alex Brynell", room:"CLAB2", start:tmin(2,0,true), end:tmin(5,0,true)},
  // Friday
  {day:"Friday", code:"6APPDEV", name:"Application Development and Emerging Technologies (Laboratory)", instructor:"Hernandez, Chelsi", room:"CLAB7", start:tmin(1,0,true), end:tmin(4,0,true)},
  {day:"Friday", code:"6APPDEV", name:"Application Development and Emerging Technologies", instructor:"Hernandez, Chelsi", room:"CLAB7", start:tmin(4,0,true), end:tmin(6,0,true)},
];

const DAY_ORDER = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

/* ============================================================
   TASKS — persisted in localStorage
   status: 'active' | 'completed' | 'expired' | 'deleted'
   ============================================================ */
const TASKS_KEY = 'classline-tasks-v1';
let TASKS = [];
let editingTaskId = null;

function loadTasks(){
  try{
    const raw = localStorage.getItem(TASKS_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveTasks(){
  try{ localStorage.setItem(TASKS_KEY, JSON.stringify(TASKS)); }catch(e){ /* storage unavailable */ }
}
TASKS = loadTasks();

function getUniqueSubjects(){
  const map = new Map();
  SCHEDULE.forEach(c => {
    if(!map.has(c.code)) map.set(c.code, c.name.replace(/\s*\(Laboratory\)\s*$/i,'').trim());
  });
  return Array.from(map, ([code, name]) => ({code, name}));
}
function subjectName(code){
  const found = getUniqueSubjects().find(s => s.code === code);
  return found ? found.name : code;
}
function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function taskDueTimestamp(task){
  return new Date(task.dueDate + 'T' + (task.dueTime || '23:59') + ':00').getTime();
}
function formatTaskRemaining(ms){
  const totalMin = Math.round(Math.abs(ms) / 60000);
  const days = Math.floor(totalMin / 1440);
  const hours = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  const parts = [];
  if(days > 0) parts.push(days + (days===1?" day":" days"));
  if(hours > 0) parts.push(hours + (hours===1?" hour":" hours"));
  if(mins > 0 || parts.length === 0) parts.push(mins + (mins===1?" minute":" minutes"));
  return parts.slice(0,2).join(" ");
}
function formatTaskDueLabel(task){
  const d = new Date(task.dueDate + 'T00:00:00');
  const dateLabel = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  const [hh, mm] = (task.dueTime || '23:59').split(':').map(Number);
  const pm = hh >= 12; let h12 = hh % 12; if(h12===0) h12 = 12;
  return dateLabel + ' · ' + h12 + ':' + String(mm).padStart(2,'0') + ' ' + (pm ? 'PM':'AM');
}
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function renderTaskContent(text){
  // Splits multi-line task text into a bulleted checklist (Font Awesome
  // markers, not default browser bullets or emoji). Single-line tasks
  // render as plain text so short tasks stay compact.
  const lines = (text || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if(lines.length <= 1){
    return escapeHTML(lines[0] || '');
  }
  return `<ul class="task-list">${lines.map(l => `<li>${escapeHTML(l)}</li>`).join('')}</ul>`;
}

/* ============================================================
   THEME
   ============================================================ */
const root = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const moonSlot = document.getElementById('moonSlot');
const sunSlot = document.getElementById('sunSlot');

function applyTheme(theme){
  if(theme === 'light'){
    root.setAttribute('data-theme','light');
    sunSlot.classList.add('active'); moonSlot.classList.remove('active');
  } else {
    root.removeAttribute('data-theme');
    moonSlot.classList.add('active'); sunSlot.classList.remove('active');
  }
  localStorage.setItem('classline-theme', theme);
}
applyTheme(localStorage.getItem('classline-theme') || 'dark');
themeToggle.addEventListener('click', function(){
  const current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current === 'light' ? 'dark' : 'light');
});

/* ============================================================
   TABS
   ============================================================ */
const tabBtns = document.querySelectorAll('.tab-btn');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

/* ============================================================
   HELPERS
   ============================================================ */
function formatClock(h24, m){
  const pm = h24 >= 12;
  let h = h24 % 12; if(h === 0) h = 12;
  return h + ":" + String(m).padStart(2,'0');
}
function minsToLabel(mins){
  const h24 = Math.floor(mins/60), m = mins%60;
  const pm = h24 >= 12;
  let h = h24 % 12; if(h===0) h = 12;
  return h + ":" + String(m).padStart(2,'0') + " " + (pm ? "PM":"AM");
}
function durationLabel(totalMinutes){
  const h = Math.floor(totalMinutes/60), m = totalMinutes%60;
  const parts = [];
  if(h>0) parts.push(h + (h===1?" hour":" hours"));
  if(m>0 || h===0) parts.push(m + (m===1?" minute":" minutes"));
  return parts.join(" ");
}

/* ============================================================
   RENDER STATE (cached to avoid unnecessary DOM writes)
   ============================================================ */
let lastMinuteKey = null;   // yyyy-mm-dd-hh-mm, drives status/countdown recompute
let lastDayKey = null;      // drives full re-render of lists

function getTaskReminderHTML(cls){
  // Show a reminder for any active task due today for this subject
  const today = todayISO();
  const matches = TASKS.filter(t => t.status === 'active' && t.subjectCode === cls.code && t.dueDate === today);
  if(matches.length === 0) return '';
  return matches.map(t => `
    <div class="task-reminder">
      <i class="fa-solid fa-bell"></i>
      <div class="task-reminder-body">
        <div class="task-reminder-head"><b>Task due</b> <span class="tr-due">· ${formatTaskDueLabel(t)}</span></div>
        <div class="task-reminder-content">${renderTaskContent(t.title)}</div>
      </div>
    </div>`).join('');
}

function buildDailyCard(cls, status, nowMinutes){
  const card = document.createElement('div');
  card.className = 'class-card' + (status.state === 'finished' ? ' finished' : '') + (status.featured ? ' featured' : '');

  const pillClass = status.state === 'ongoing' ? 'ongoing' : status.state === 'upcoming' ? 'upcoming' : 'finished';
  const pillIcon = status.state === 'ongoing' ? 'fa-play' : status.state === 'upcoming' ? 'fa-clock' : 'fa-check';
  const pillLabel = status.state === 'ongoing' ? 'Ongoing' : status.state === 'upcoming' ? 'Upcoming' : 'Finished';

  let countdownHTML = '';
  if(status.state === 'upcoming'){
    countdownHTML = `<div class="cc-countdown"><i class="fa-solid fa-hourglass-half"></i> Starts in ${durationLabel(cls.start - nowMinutes)}</div>`;
  } else if(status.state === 'ongoing'){
    countdownHTML = `<div class="cc-countdown ending"><i class="fa-solid fa-hourglass-end"></i> Ends in ${durationLabel(cls.end - nowMinutes)}</div>`;
  }

  card.innerHTML = `
    <div class="cc-top">
      <div>
        <span class="cc-code">${cls.code}</span>
        <div class="cc-name">${cls.name}</div>
      </div>
      <div class="status-pill ${pillClass}"><i class="fa-solid ${pillIcon}"></i>${pillLabel}</div>
    </div>
    <div class="cc-meta">
      <div class="cc-meta-item"><i class="fa-solid fa-user"></i><b>${cls.instructor}</b></div>
      <div class="cc-meta-item"><i class="fa-solid fa-location-dot"></i><b>${cls.room}</b></div>
      <div class="cc-meta-item"><i class="fa-solid fa-calendar-day"></i><b>${cls.day}</b></div>
      <div class="cc-meta-item"><i class="fa-solid fa-book"></i><b>${cls.code}</b></div>
    </div>
    <div class="cc-time"><i class="fa-solid fa-clock"></i> ${minsToLabel(cls.start)} <span class="arrow">→</span> ${minsToLabel(cls.end)}</div>
    ${countdownHTML}
    ${getTaskReminderHTML(cls)}
  `;
  return card;
}

function buildWeekCard(cls){
  const card = document.createElement('div');
  card.className = 'week-card';
  card.innerHTML = `
    <div class="wc-code">${cls.code}</div>
    <div class="wc-name">${cls.name}</div>
    <div class="wc-row"><i class="fa-solid fa-user"></i>${cls.instructor}</div>
    <div class="wc-row"><i class="fa-solid fa-location-dot"></i>${cls.room}</div>
    <div class="wc-row"><i class="fa-solid fa-clock"></i>${minsToLabel(cls.start)} – ${minsToLabel(cls.end)}</div>
  `;
  return card;
}

function renderWeekly(){
  const container = document.getElementById('weeklyContent');
  container.innerHTML = '';
  const todayName = DAY_NAMES[new Date().getDay()];

  DAY_ORDER.forEach(day => {
    const classes = SCHEDULE.filter(c => c.day === day).sort((a,b) => a.start - b.start);
    const block = document.createElement('div');
    block.className = 'week-day-block';

    const header = document.createElement('div');
    header.className = 'week-day-header' + (day === todayName ? ' today' : '');
    header.innerHTML = `<div class="dot"></div><h3>${day}</h3><div class="count">${classes.length} class${classes.length===1?'':'es'}</div>`;
    block.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'week-grid';
    classes.forEach(cls => grid.appendChild(buildWeekCard(cls)));
    block.appendChild(grid);

    container.appendChild(block);
  });
}

function renderDailyStructure(){
  // Rebuild the list of today's classes (called once per day, or on load)
  const container = document.getElementById('dailyContent');
  container.innerHTML = '';
  const todayName = DAY_NAMES[new Date().getDay()];
  const classes = SCHEDULE.filter(c => c.day === todayName).sort((a,b) => a.start - b.start);

  if(classes.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-mug-hot"></i>
        <h3>No classes scheduled today.</h3>
        <p>Enjoy your weekend!</p>
      </div>`;
    return;
  }

  const label = document.createElement('div');
  label.className = 'section-label';
  label.innerHTML = `<i class="fa-solid fa-list"></i> Today · ${todayName}`;
  container.appendChild(label);

  const listWrap = document.createElement('div');
  listWrap.id = 'dailyList';
  container.appendChild(listWrap);

  classes.forEach(cls => {
    const cardHolder = document.createElement('div');
    cardHolder.dataset.start = cls.start;
    cardHolder.dataset.end = cls.end;
    listWrap.appendChild(cardHolder);
  });
}

function computeStatus(cls, nowMinutes){
  if(nowMinutes < cls.start) return {state:'upcoming'};
  if(nowMinutes >= cls.start && nowMinutes < cls.end) return {state:'ongoing'};
  return {state:'finished'};
}

function updateDailyStatuses(){
  const now = new Date();
  const nowMinutes = now.getHours()*60 + now.getMinutes();
  const todayName = DAY_NAMES[now.getDay()];
  const classes = SCHEDULE.filter(c => c.day === todayName).sort((a,b) => a.start - b.start);
  if(classes.length === 0) return;

  const listWrap = document.getElementById('dailyList');
  if(!listWrap) return;

  // Determine which class should be "featured" (ongoing, else nearest upcoming)
  let featuredIndex = -1;
  let ongoingFound = false;
  classes.forEach((cls, i) => {
    const st = computeStatus(cls, nowMinutes);
    if(st.state === 'ongoing' && !ongoingFound){ featuredIndex = i; ongoingFound = true; }
  });
  if(!ongoingFound){
    for(let i=0;i<classes.length;i++){
      if(computeStatus(classes[i], nowMinutes).state === 'upcoming'){ featuredIndex = i; break; }
    }
  }

  classes.forEach((cls, i) => {
    const holder = listWrap.children[i];
    if(!holder) return;
    const status = computeStatus(cls, nowMinutes);
    status.featured = (i === featuredIndex);
    const newCard = buildDailyCard(cls, status, nowMinutes);
    holder.innerHTML = '';
    holder.appendChild(newCard);
  });

  // Update hero status strip
  const heroStatus = document.getElementById('heroStatus');
  const heroStatusText = document.getElementById('heroStatusText');
  if(ongoingFound){
    const cls = classes[featuredIndex];
    heroStatus.classList.remove('idle');
    heroStatusText.innerHTML = `<strong>${cls.code}</strong> is ongoing in ${cls.room} · ends in ${durationLabel(cls.end - nowMinutes)}`;
  } else if(featuredIndex !== -1){
    const cls = classes[featuredIndex];
    heroStatus.classList.remove('idle');
    heroStatusText.innerHTML = `Next up: <strong>${cls.code}</strong> at ${minsToLabel(cls.start)} · starts in ${durationLabel(cls.start - nowMinutes)}`;
  } else {
    heroStatus.classList.add('idle');
    heroStatusText.innerHTML = `All classes for today are <strong>finished</strong>. Well done!`;
  }
}

/* ============================================================
   TASKS FEATURE
   ============================================================ */
const taskSubjectSelect = document.getElementById('taskSubject');
const taskTitleInput = document.getElementById('taskTitle');
const taskDateInput = document.getElementById('taskDate');
const taskTimeInput = document.getElementById('taskTime');
const taskForm = document.getElementById('taskForm');
const taskSubmitBtn = document.getElementById('taskSubmitBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const activeTasksList = document.getElementById('activeTasksList');
const previousTasksList = document.getElementById('previousTasksList');

function populateSubjectDropdown(){
  taskSubjectSelect.innerHTML = getUniqueSubjects()
    .map(s => `<option value="${s.code}">${s.code} — ${s.name}</option>`)
    .join('');
}
populateSubjectDropdown();
taskDateInput.min = todayISO();

function setFormMode(mode){
  if(mode === 'edit'){
    taskSubmitBtn.innerHTML = '<i class="fa-solid fa-check"></i> <span>Update Task</span>';
    cancelEditBtn.style.display = 'inline-flex';
  } else {
    taskSubmitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> <span>Add Task</span>';
    cancelEditBtn.style.display = 'none';
  }
}
function resetTaskForm(){
  taskForm.reset();
  taskDateInput.min = todayISO();
  editingTaskId = null;
  setFormMode('add');
}
cancelEditBtn.addEventListener('click', resetTaskForm);

taskForm.addEventListener('submit', function(e){
  e.preventDefault();
  const subjectCode = taskSubjectSelect.value;
  const title = taskTitleInput.value.trim();
  const dueDate = taskDateInput.value;
  const dueTime = taskTimeInput.value;
  if(!subjectCode || !title || !dueDate || !dueTime) return;

  if(editingTaskId){
    const existing = TASKS.find(t => t.id === editingTaskId);
    if(existing){
      existing.subjectCode = subjectCode;
      existing.title = title;
      existing.dueDate = dueDate;
      existing.dueTime = dueTime;
    }
  } else {
    TASKS.push({
      id: 'tk_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
      subjectCode, title, dueDate, dueTime,
      status: 'active',
      createdAt: Date.now()
    });
  }
  saveTasks();
  resetTaskForm();
  rebuildTaskLists();
});

// Event delegation for edit / delete / complete actions on task cards
document.getElementById('view-tasks').addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const id = btn.dataset.id;
  const task = TASKS.find(t => t.id === id);
  if(!task) return;
  const action = btn.dataset.action;

  if(action === 'edit'){
    editingTaskId = id;
    taskSubjectSelect.value = task.subjectCode;
    taskTitleInput.value = task.title;
    taskDateInput.value = task.dueDate;
    taskTimeInput.value = task.dueTime;
    setFormMode('edit');
    taskForm.scrollIntoView({ block:'start' });
  } else if(action === 'delete'){
    task.status = 'deleted';
    saveTasks();
    rebuildTaskLists();
  } else if(action === 'complete'){
    task.status = 'completed';
    saveTasks();
    rebuildTaskLists();
  }
});

function buildActiveTaskCard(task, now){
  const remainingMs = taskDueTimestamp(task) - now.getTime();
  const today = todayISO();
  let pillClass = 'upcoming', pillLabel = 'Upcoming', pillIcon = 'fa-hourglass-half';
  if(remainingMs < 0){ pillClass = 'overdue'; pillLabel = 'Overdue'; pillIcon = 'fa-triangle-exclamation'; }
  else if(task.dueDate === today){ pillClass = 'due-today'; pillLabel = 'Due Today'; pillIcon = 'fa-bell'; }

  const countdownText = remainingMs < 0
    ? 'Overdue by ' + formatTaskRemaining(remainingMs)
    : 'Due in ' + formatTaskRemaining(remainingMs);

  const card = document.createElement('div');
  card.className = 'task-card';
  card.innerHTML = `
    <div class="task-card-top">
      <div>
        <span class="tc-subject">${task.subjectCode}</span>
        <div class="tc-title">${renderTaskContent(task.title)}</div>
      </div>
      <div class="task-pill ${pillClass}"><i class="fa-solid ${pillIcon}"></i>${pillLabel}</div>
    </div>
    <div class="tc-meta">
      <span><i class="fa-solid fa-book"></i>${subjectName(task.subjectCode)}</span>
      <span><i class="fa-solid fa-calendar-days"></i>${formatTaskDueLabel(task)}</span>
    </div>
    <div class="tc-countdown"><i class="fa-solid fa-timer"></i>${countdownText}</div>
    <div class="tc-actions">
      <button type="button" class="tc-icon-btn" data-action="edit" data-id="${task.id}" aria-label="Edit task"><i class="fa-solid fa-pencil"></i></button>
      <button type="button" class="tc-icon-btn success" data-action="complete" data-id="${task.id}" aria-label="Mark complete"><i class="fa-solid fa-check"></i></button>
      <button type="button" class="tc-icon-btn danger" data-action="delete" data-id="${task.id}" aria-label="Delete task"><i class="fa-solid fa-trash"></i></button>
    </div>
  `;
  return card;
}

function buildPreviousTaskCard(task){
  const reasonMap = {
    completed: {label:'Completed', cls:'reason-completed', icon:'fa-check'},
    expired: {label:'Expired', cls:'reason-expired', icon:'fa-triangle-exclamation'},
    deleted: {label:'Deleted', cls:'reason-deleted', icon:'fa-trash'}
  };
  const reason = reasonMap[task.status] || reasonMap.deleted;

  const card = document.createElement('div');
  card.className = 'task-card previous';
  card.innerHTML = `
    <div class="task-card-top">
      <div>
        <span class="tc-subject">${task.subjectCode}</span>
        <div class="tc-title">${renderTaskContent(task.title)}</div>
      </div>
      <div class="task-pill ${reason.cls}"><i class="fa-solid ${reason.icon}"></i>${reason.label}</div>
    </div>
    <div class="tc-meta">
      <span><i class="fa-solid fa-book"></i>${subjectName(task.subjectCode)}</span>
      <span><i class="fa-solid fa-calendar-days"></i>${formatTaskDueLabel(task)}</span>
    </div>
  `;
  return card;
}

function rebuildTaskLists(){
  const now = new Date();
  const active = TASKS.filter(t => t.status === 'active').sort((a,b) => taskDueTimestamp(a) - taskDueTimestamp(b));
  const previous = TASKS.filter(t => t.status !== 'active').sort((a,b) => taskDueTimestamp(b) - taskDueTimestamp(a));

  activeTasksList.innerHTML = '';
  if(active.length === 0){
    activeTasksList.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-clipboard-check"></i>
        <h3>No active tasks.</h3>
        <p>Add a task above to keep track of your deadlines.</p>
      </div>`;
  } else {
    active.forEach(t => activeTasksList.appendChild(buildActiveTaskCard(t, now)));
  }

  previousTasksList.innerHTML = '';
  if(previous.length === 0){
    previousTasksList.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <h3>No task history yet.</h3>
        <p>Completed, expired, and deleted tasks will appear here.</p>
      </div>`;
  } else {
    previous.forEach(t => previousTasksList.appendChild(buildPreviousTaskCard(t)));
  }
}

function autoExpireTasks(now){
  let changed = false;
  TASKS.forEach(t => {
    if(t.status === 'active' && now.getTime() > taskDueTimestamp(t)){
      t.status = 'expired';
      changed = true;
    }
  });
  if(changed) saveTasks();
  return changed;
}

/* ============================================================
   CLASS REMINDER NOTIFICATIONS
   Fires a popup notification 60 / 30 / 10 minutes before each
   class starts. Uses the browser Notification API so it works
   on both desktop and mobile browsers that support it.
   ============================================================ */
const NOTIFY_STAGES = [
  {minutesBefore:60, message:"Plenty of time, but hurry up!"},
  {minutesBefore:30, message:"Remember that the early bird gets the worm."},
  {minutesBefore:10, message:"If you are there, stay calm. If not, run... just run!"}
];
let notifiedKeys = new Set(); // reset whenever the calendar day changes

function requestNotificationPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
requestNotificationPermission();

function fireClassNotification(cls, stage){
  const title = cls.code + " starts in " + stage.minutesBefore + " minutes";
  const body = stage.message;
  if('Notification' in window && Notification.permission === 'granted'){
    try{
      new Notification(title, { body: body, tag: cls.code + '-' + cls.start + '-' + stage.minutesBefore });
    }catch(e){ /* some browsers require a service worker; fail silently */ }
  }
}

function checkClassNotifications(now, todayName){
  const nowMinutes = now.getHours()*60 + now.getMinutes();
  const dayKey = now.toDateString();
  SCHEDULE.filter(c => c.day === todayName).forEach(cls => {
    NOTIFY_STAGES.forEach(stage => {
      const key = dayKey + '-' + cls.code + '-' + cls.start + '-' + stage.minutesBefore;
      if(!notifiedKeys.has(key) && (cls.start - nowMinutes) === stage.minutesBefore){
        notifiedKeys.add(key);
        fireClassNotification(cls, stage);
      }
    });
  });
}

/* ============================================================
   CLOCK / MAIN TICK
   ============================================================ */
function tick(){
  const now = new Date();
  const dayKey = now.toDateString();

  // Hero clock
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const pm = h >= 12;
  let h12 = h % 12; if(h12 === 0) h12 = 12;
  document.getElementById('heroTime').textContent = h12 + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  document.getElementById('heroMeridiem').textContent = pm ? "PM" : "AM";
  document.getElementById('heroDay').textContent = DAY_NAMES[now.getDay()];
  document.getElementById('heroFullDate').textContent = now.toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' });

  // Rebuild list structure only when the day changes (or first run)
  if(dayKey !== lastDayKey){
    lastDayKey = dayKey;
    notifiedKeys = new Set();
    renderDailyStructure();
    renderWeekly();
  }

  // Move any tasks past their due date/time into task history
  autoExpireTasks(now);

  // Update statuses/countdowns every second (cheap: only touches today's cards)
  updateDailyStatuses();

  // Refresh the Tasks tab (cheap: small dataset, keeps countdowns live)
  rebuildTaskLists();

  // Check whether any class reminder popups should fire
  checkClassNotifications(now, DAY_NAMES[now.getDay()]);
}

tick();
setInterval(tick, 1000);

})();
</script>
